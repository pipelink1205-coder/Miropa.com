name: CI

# Corre en cada push y en cada Pull Request hacia main/develop.
# Se ejecuta en Ubuntu (Linux), igual que el servidor de producción, por lo que
# detecta automáticamente errores de mayúsculas/minúsculas en rutas que pasan
# desapercibidos en Windows (Laragon).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pruebas:
    name: Estilo y pruebas
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, gd, bcmath, intl, zip, sqlite3, pdo_sqlite
          coverage: none

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias de PHP
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Preparar entorno
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Instalar y compilar el frontend
        run: |
          npm ci
          npm run build

      - name: Verificar estilo de código (Pint)
        run: ./vendor/bin/pint --test

      - name: Ejecutar la suite de pruebas
        run: php artisan test
